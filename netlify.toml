[build]
  command   = "npm run build"
  publish   = ".next"

# Next.js SSR plugin — required after removing output: "export"
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options                = "DENY"
    X-Content-Type-Options         = "nosniff"
    X-XSS-Protection               = "1; mode=block"
    Referrer-Policy                = "strict-origin-when-cross-origin"
    Permissions-Policy             = "camera=(), microphone=(), geolocation=(), payment=(self)"
    Strict-Transport-Security      = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy        = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.stripe.com https://www.google-analytics.com https://*.supabase.co; frame-src https://js.stripe.com; object-src 'none'; base-uri 'self'"

# ── Static asset cache ────────────────────────────────────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirects ─────────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/home"
  to     = "/"
  status = 301

[[redirects]]
  from   = "/contractors"
  to     = "/find-contractors"
  status = 301

[[redirects]]
  from   = "/sign-up"
  to     = "/signup"
  status = 301

[[redirects]]
  from   = "/sign-in"
  to     = "/login"
  status = 301

[[redirects]]
  from   = "/register"
  to     = "/join"
  status = 301
